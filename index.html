<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stunning Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0f172a; --card: rgba(30, 41, 59, 0.7); --text: #f8fafc; --accent: #38bdf8; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0; background: var(--bg); color: var(--text); 
            line-height: 1.6; 
        }

        /* Hero Section with Glass Overlay */
        .hero { 
            height: 100vh; 
            background: url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=2072') center/cover;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; padding: 20px;
        }

        .glass-panel {
            background: var(--card);
            backdrop-filter: blur(15px);
            padding: 3rem;
            border-radius: 2rem;
            border: 1px solid rgba(255,255,255,0.1);
            max-width: 600px;
        }

        h1 { font-size: 3rem; margin: 0 0 1rem; letter-spacing: -2px; }
        .accent { color: var(--accent); }

        /* Project Cards */
        .showcase { padding: 5rem 2rem; max-width: 1100px; margin: auto; display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 2rem; }
        
        .card { 
            background: #1e293b; border-radius: 1.5rem; overflow: hidden;
            transition: 0.4s ease; border: 1px solid #334155;
        }
        .card:hover { transform: translateY(-15px); border-color: var(--accent); box-shadow: 0 20px 40px rgba(56, 189, 248, 0.2); }
        .card img { width: 100%; height: 220px; object-fit: cover; }
        .card-content { padding: 1.5rem; }
    </style>
</head>
<body>

    <div class="hero">
        <div class="glass-panel">
            <h1>Elevate your <span class="accent">Digital Presence</span></h1>
            <p>Automated, lightning-fast, and visually stunning. This is how modern web development should feel.</p>
        </div>
    </div>

    <section class="showcase">
        <div class="card">
            <img src="https://images.unsplash.com/photo-1518770660439-4636190af475?q=80&w=1000" alt="Tech">
            <div class="card-content"><h3>Future Tech</h3><p>Innovation at the edge of possibility.</p></div>
        </div>
        <div class="card">
            <img src="https://images.unsplash.com/photo-1550751827-4bd374c3f58b?q=80&w=1000" alt="Code">
            <div class="card-content"><h3>Clean Code</h3><p>Architecture that scales effortlessly.</p></div>
        </div>
        <div class="card">
            <img src="https://images.unsplash.com/photo-1614728853634-11910a3014a5?q=80&w=1000" alt="Design">
            <div class="card-content"><h3>Design Systems</h3><p>Beautiful interfaces made simple.</p></div>
        </div>
    </section>

</body>
</html>
