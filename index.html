<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gourmet Bites | Fine Dining</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --dark: #1a1a1a; --light: #f4f4f4; }
        body { font-family: 'Poppins', sans-serif; margin: 0; background: var(--dark); color: white; }

        /* Hero */
        .hero { 
            height: 80vh; 
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://images.unsplash.com/photo-1504674900247-0877df9cc836?q=80&w=2000');
            background-size: cover; background-position: center;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center;
        }
        h1 { font-family: 'Playfair Display', serif; font-size: 4rem; margin: 0; color: var(--gold); }

        /* Menu Grid */
        .menu { padding: 4rem 2rem; max-width: 1200px; margin: auto; display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 2rem; }
        .dish { background: #252525; border-radius: 15px; overflow: hidden; transition: 0.3s; }
        .dish:hover { transform: scale(1.03); }
        .dish img { width: 100%; height: 250px; object-fit: cover; }
        .info { padding: 1.5rem; }
        .price { color: var(--gold); font-weight: bold; font-size: 1.2rem; }
    </style>
</head>
<body>

    <div class="hero">
        <h1>Gourmet Bites</h1>
        <p>Experience the art of fine dining.</p>
    </div>

    <div class="menu">
        <div class="dish">
            <img src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c?q=80&w=800" alt="Salad">
            <div class="info"><h3>Garden Fresh Salad</h3><p class="price">$14.00</p></div>
        </div>
        <div class="dish">
            <img src="https://images.unsplash.com/photo-1555939594-58d7cb561ad1?q=80&w=800" alt="Steak">
            <div class="info"><h3>Signature Ribeye</h3><p class="price">$32.00</p></div>
        </div>
        <div class="dish">
            <img src="https://images.unsplash.com/photo-1563379091339-03b21ab4a4f8?q=80&w=800" alt="Sushi">
            <div class="info"><h3>Artisan Sushi Set</h3><p class="price">$28.00</p></div>
        </div>
    </div>

</body>
</html>
