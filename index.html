<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stunning Showcase</title>
    <style>
        :root { --accent: #ff3e00; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f4f4f9; }
        
        /* Hero Section */
        .hero { 
            height: 60vh; 
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url('https://picsum.photos/1600/900?random=1');
            background-size: cover;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
        }

        /* Grid Section */
        .container { max-width: 1000px; margin: 2rem auto; padding: 0 1rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 2rem; }
        
        .card { 
            background: white; border-radius: 12px; overflow: hidden; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .card img { width: 100%; height: 200px; object-fit: cover; }
        .card-content { padding: 1rem; }
    </style>
</head>
<body>

    <div class="hero">
        <div>
            <h1>Welcome to My Project</h1>
            <p>Automated deployment, stunning visuals.</p>
        </div>
    </div>

    <div class="container">
        <div class="grid">
            <div class="card">
                <img src="https://picsum.photos/600/400?random=2" alt="Project 1">
                <div class="card-content"><h3>Modern Design</h3><p>Built with CSS Grid.</p></div>
            </div>
            <div class="card">
                <img src="https://picsum.photos/600/400?random=3" alt="Project 2">
                <div class="card-content"><h3>Responsive</h3><p>Looks great on phones.</p></div>
            </div>
        </div>
    </div>

</body>
</html>
