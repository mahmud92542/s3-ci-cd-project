<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Awesome Project</title>
    <style>
        :root {
            --primary: #6366f1;
            --bg: #0f172a;
            --card-bg: #1e293b;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .project-card {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
            text-align: center;
            width: 300px;
            border: 1px solid #334155;
            transition: transform 0.3s ease;
        }

        .project-card:hover { transform: translateY(-5px); }

        h2 { margin-top: 0; color: #f8fafc; }
        p { color: #94a3b8; font-size: 0.9rem; }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-weight: 600;
            margin-top: 1rem;
            transition: background 0.2s;
        }

        button:hover { background: #4f46e5; }
        #count { display: block; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="project-card">
        <h2>My Cool Project</h2>
        <p>This site is deployed automatically via GitHub Actions whenever I push code to S3.</p>
        <button id="likeBtn">Like this project</button>
        <span id="count">Likes: 0</span>
    </div>

    <script>
        let likes = 0;
        const btn = document.getElementById('likeBtn');
        const countDisplay = document.getElementById('count');

        btn.addEventListener('click', () => {
            likes++;
            countDisplay.innerText = `Likes: ${likes}`;
            btn.style.transform = 'scale(0.95)';
            setTimeout(() => btn.style.transform = 'scale(1)', 100);
        });
    </script>
</body>
</html>
